sdlc:
  agents:
    - prepare-environment
    - implementation
    - merge
    - cleanup-environment
  workflow:
    - state: Draft
      artifact: prompt.md
    - state: "@prepare-environment"
      agent: prepare-environment
      artifact: environment-state.md
    - state: "@implementation"
      agent: implementation
      artifact: implementation-details.md
    - state: Review implementation
    - state: "@merge"
      agent: merge
      artifact: change-log.md
    - state: "@cleanup-environment"
      agent: cleanup-environment
      artifact: cleanup-environment.md
    - state: Done
